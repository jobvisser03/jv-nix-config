name: Build and push to Cachix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - larkbox
          - macbook-intel-nixos
          - macbook-intel-nixos-sooph
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: jv-nix-config-cache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ${{ matrix.config }}
        run: nix build .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel --no-link --print-build-logs

  build-darwin:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - macbook-silicon
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: jv-nix-config-cache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ${{ matrix.config }}
        run: nix build .#darwinConfigurations.${{ matrix.config }}.system --no-link --print-build-logs
